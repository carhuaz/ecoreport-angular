<div class="page-form">
  <div class="form-card">
    <div class="form-header">
      <span class="form-icon">📋</span>
      <h1>Registrar reporte</h1>
      <p>Describe el punto crítico de basura para que sea atendido por las autoridades.</p>
    </div>

    <div class="alert alert-error" *ngIf="error">{{ error }}</div>
    <div class="alert alert-success" *ngIf="exito">✅ Reporte enviado correctamente. Redirigiendo...</div>

    <div class="form-group">
      <label for="titulo">Título del reporte <span class="req">*</span></label>
      <input id="titulo" type="text" [(ngModel)]="titulo" placeholder="Ej: Acumulación de basura en Av. Grau" />
    </div>

    <div class="form-group">
      <label for="descripcion">Descripción <span class="req">*</span></label>
      <textarea id="descripcion" [(ngModel)]="descripcion" rows="4"
        placeholder="Describe el problema, cuánto tiempo lleva así, qué tipo de residuos hay..."></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="distrito">Distrito <span class="req">*</span></label>
        <select id="distrito" [(ngModel)]="distrito">
          <option value="Huancayo">Huancayo</option>
          <option value="El Tambo">El Tambo</option>
          <option value="Chilca">Chilca</option>
        </select>
      </div>

      <div class="form-group">
        <label for="prioridad">Prioridad</label>
        <select id="prioridad" [(ngModel)]="prioridad">
          <option value="Baja">Baja</option>
          <option value="Media">Media</option>
          <option value="Alta">Alta</option>
          <option value="Crítica">Crítica</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label for="direccion">Dirección o referencia <span class="req">*</span></label>
      <input id="direccion" type="text" [(ngModel)]="direccion" placeholder="Ej: Jr. Cusco cdra. 3, frente al parque" />
    </div>

    <div class="form-group">
      <label>Ubicación en el mapa <span class="req">*</span></label>
      <app-eco-map
        [seleccionable]="true"
        [latitud]="latitud"
        [longitud]="longitud"
        altura="350px"
        (ubicacionChange)="onUbicacionChange($event)"
      />
      <small *ngIf="latitud !== undefined && longitud !== undefined">
        Coordenadas: {{ latitud | number:'1.5-5' }}, {{ longitud | number:'1.5-5' }}
      </small>
    </div>

    <div class="form-group">
      <label>Imágenes de evidencia <span class="req">*</span></label>
      <app-image-uploader 
        [imagenes]="imagenes" 
        (imagenesChange)="onImagenesChange($event)">
      </app-image-uploader>
    </div>

    <button class="btn-submit" (click)="enviar()">Enviar reporte</button>
  </div>
</div>
