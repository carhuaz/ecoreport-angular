<div class="page-section">
  <div class="page-header">
    <h1>Mis reportes</h1>
    <p>Historial de reportes ciudadanos registrados en EcoReport</p>
    <a routerLink="/reportar" class="btn-nuevo">+ Nuevo reporte</a>
  </div>

  <div *ngIf="reportes.length === 0" class="empty-state">
    <span>📭</span>
    <p>No has registrado ningún reporte aún.</p>
    <a routerLink="/reportar" class="btn-nuevo">Crear mi primer reporte</a>
  </div>

  <div class="reportes-grid" *ngIf="reportes.length > 0">
    <app-card-reporte *ngFor="let r of reportes" [reporte]="r" />
  </div>
</div>
