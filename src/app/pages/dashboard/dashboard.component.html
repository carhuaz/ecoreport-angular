<div class="page-dashboard">
  <div class="page-header">
    <h1>Dashboard de reportes</h1>
    <p>Resumen general de reportes ciudadanos en Huancayo</p>
  </div>

  <!-- KPIs -->
  <div class="kpi-grid">
    <div class="kpi-card kpi-total">
      <span class="kpi-value">{{ total }}</span>
      <span class="kpi-label">Total reportes</span>
    </div>
    <div class="kpi-card kpi-pendiente">
      <span class="kpi-value">{{ pendientes }}</span>
      <span class="kpi-label">Pendientes</span>
    </div>
    <div class="kpi-card kpi-programado">
      <span class="kpi-value">{{ programados }}</span>
      <span class="kpi-label">Programados</span>
    </div>
    <div class="kpi-card kpi-atendido">
      <span class="kpi-value">{{ atendidos }}</span>
      <span class="kpi-label">Atendidos</span>
    </div>
  </div>

  <div class="mapa-section">
    <h2>Mapa de puntos críticos</h2>
    <app-eco-map [reportes]="reportes" altura="360px" />
  </div>

  <!-- Lista de reportes -->
  <div class="reportes-section">
    <h2>Reportes registrados</h2>
    <div class="reportes-grid">
      <app-card-reporte *ngFor="let r of reportes" [reporte]="r" />
    </div>
  </div>
</div>
