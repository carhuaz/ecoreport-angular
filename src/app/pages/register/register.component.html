<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">🌿</div>
    <h2>Crear cuenta ciudadana</h2>
    <p class="auth-sub">EcoReport Huancayo</p>

    <div class="alert alert-error" *ngIf="error">{{ error }}</div>
    <div class="alert alert-success" *ngIf="exito">✅ Cuenta ciudadana creada correctamente. Redirigiendo...</div>

    <div class="form-group">
      <label for="nombre">Nombre completo</label>
      <input id="nombre" type="text" [(ngModel)]="nombre" placeholder="Tu nombre completo" />
    </div>

    <div class="form-group">
      <label for="email">Correo electrónico</label>
      <input id="email" type="email" [(ngModel)]="email" placeholder="tu@correo.com" />
    </div>

    <div class="form-group">
      <label for="password">Contraseña</label>
      <input id="password" type="password" [(ngModel)]="password" placeholder="Mínimo 6 caracteres" />
    </div>

    <div class="form-group">
      <label for="confirmPassword">Confirmar contraseña</label>
      <input id="confirmPassword" type="password" [(ngModel)]="confirmPassword" placeholder="Repite tu contraseña" />
    </div>

    <button class="btn-submit" (click)="registrar()">Crear cuenta</button>

    <p class="auth-link">¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a></p>
  </div>
</div>
